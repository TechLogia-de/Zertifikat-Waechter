<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1020"/>
      <stop offset="50%" stop-color="#1B1F3A"/>
      <stop offset="100%" stop-color="#2C0B45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#25F4EE"/>
      <stop offset="100%" stop-color="#FE2C55"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative gradient bars -->
  <rect x="0" y="0" width="1080" height="14" fill="url(#accent)"/>
  <rect x="0" y="1906" width="1080" height="14" fill="url(#accent)"/>

  <!-- Top label -->
  <g transform="translate(540, 150)" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif">
    <rect x="-260" y="-58" width="520" height="100" rx="50" fill="#FE2C55" filter="url(#softShadow)"/>
    <text y="14" font-size="62" fill="#fff" letter-spacing="3">ICH FRAG CHATGPT</text>
  </g>

  <!-- Main question card -->
  <g transform="translate(540, 720)" text-anchor="middle">
    <rect x="-470" y="-340" width="940" height="680" rx="40"
          fill="#ffffff" filter="url(#softShadow)"/>
    <rect x="-470" y="-340" width="940" height="80" rx="40" fill="url(#accent)"/>
    <text x="0" y="-285" font-family="Arial Black, sans-serif"
          font-size="44" fill="#fff" letter-spacing="2">DIE FRAGE</text>

    <text font-family="Arial Black, sans-serif" fill="#0F1020"
          font-size="62" font-weight="900">
      <tspan x="0" y="-150">Ich wohne</tspan>
      <tspan x="0" y="-70" fill="#FE2C55">50 METER</tspan>
      <tspan x="0" y="10">von einer Waschanlage.</tspan>
    </text>

    <text font-family="Arial, sans-serif" fill="#1B1F3A"
          font-size="54" font-weight="700">
      <tspan x="0" y="120">Soll ich</tspan>
      <tspan x="0" y="190" fill="#0FA47A" font-weight="900">HINLAUFEN</tspan>
      <tspan x="0" y="260">oder</tspan>
    </text>
  </g>

  <!-- VS circle between options -->
  <g transform="translate(540, 1170)">
    <circle r="110" fill="url(#accent)" filter="url(#glow)"/>
    <circle r="92" fill="#0F1020"/>
    <text text-anchor="middle" y="32" font-family="Impact, sans-serif"
          font-size="120" fill="#fff" font-weight="900">VS</text>
  </g>

  <!-- Hinfahren option -->
  <g transform="translate(540, 1430)" text-anchor="middle">
    <rect x="-360" y="-70" width="720" height="140" rx="30"
          fill="#FE2C55" filter="url(#softShadow)"/>
    <text y="20" font-family="Impact, sans-serif" font-size="86"
          fill="#fff" letter-spacing="6">HINFAHREN ?</text>
  </g>

  <!-- Car icons -->
  <g transform="translate(180, 1620)" opacity="0.85">
    <g fill="#25F4EE">
      <rect x="0" y="20" width="160" height="50" rx="14"/>
      <path d="M20 20 L40 -10 L120 -10 L140 20 Z"/>
      <circle cx="35" cy="78" r="14" fill="#0F1020"/>
      <circle cx="125" cy="78" r="14" fill="#0F1020"/>
    </g>
  </g>
  <g transform="translate(740, 1620)" opacity="0.85">
    <g fill="#FE2C55">
      <rect x="0" y="20" width="160" height="50" rx="14"/>
      <path d="M20 20 L40 -10 L120 -10 L140 20 Z"/>
      <circle cx="35" cy="78" r="14" fill="#0F1020"/>
      <circle cx="125" cy="78" r="14" fill="#0F1020"/>
    </g>
  </g>

  <!-- Water droplets -->
  <g fill="#25F4EE" opacity="0.6">
    <path d="M120,1780 q-15,-25 0,-50 q15,25 0,50 z"/>
    <path d="M200,1820 q-12,-20 0,-40 q12,20 0,40 z"/>
    <path d="M880,1780 q-15,-25 0,-50 q15,25 0,50 z"/>
    <path d="M960,1820 q-12,-20 0,-40 q12,20 0,40 z"/>
  </g>

  <!-- Bottom hook line -->
  <g transform="translate(540, 1820)" text-anchor="middle">
    <text font-family="Arial Black, sans-serif" font-size="46"
          fill="#fff" letter-spacing="3">WAS WÜRDEST DU TUN ?</text>
  </g>
</svg>
