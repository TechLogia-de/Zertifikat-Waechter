<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920"
     font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace; }
      .head { font-weight: 900; letter-spacing: -4px; }
      .body { font-weight: 500; }
      .bold { font-weight: 800; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#000000"/>

  <!-- Top-left badge: VIRAL -->
  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="260" height="74" rx="37"
          fill="#1F1A05" stroke="#3A2F08" stroke-width="2"/>
    <!-- star -->
    <g transform="translate(36, 37)" fill="#FACC15">
      <path d="M0,-14 L4,-4 L14,-4 L6,3 L9,13 L0,7 L-9,13 L-6,3 L-14,-4 L-4,-4 Z"/>
    </g>
    <text x="68" y="48" class="mono" font-size="28" font-weight="700"
          fill="#FACC15" letter-spacing="2">CHATGPT FAIL</text>
  </g>

  <!-- Top-right counter -->
  <g transform="translate(910, 110)">
    <rect x="0" y="0" width="90" height="74" rx="37" fill="#0F0F0F"
          stroke="#1F1F1F" stroke-width="2"/>
    <text x="45" y="48" text-anchor="middle" class="mono" font-size="26"
          font-weight="600" fill="#9CA3AF">1 / 1</text>
  </g>

  <!-- Section label -->
  <text x="80" y="475" class="mono" font-size="34" fill="#C4B5FD"
        letter-spacing="3" font-weight="600">01 // DIE FRAGE</text>

  <!-- Headline -->
  <g fill="#C4B5FD" class="head">
    <text x="80" y="610" font-size="148">Laufen</text>
    <text x="80" y="760" font-size="148">oder fahren?</text>
  </g>

  <!-- Divider -->
  <line x1="80" y1="820" x2="1000" y2="820"
        stroke="#C4B5FD" stroke-width="2" opacity="0.45"/>

  <!-- Card 1: code-style question -->
  <g transform="translate(80, 880)">
    <rect x="0" y="0" width="920" height="280" rx="14" fill="#0E0E0E"/>
    <rect x="0" y="0" width="6" height="280" fill="#C4B5FD"/>

    <text x="50" y="80" class="mono" font-size="34"
          fill="#C4B5FD" font-weight="700">&gt; ich wohne 50m von einer</text>
    <text x="50" y="130" class="mono" font-size="34"
          fill="#C4B5FD" font-weight="700">&nbsp;&nbsp;waschanlage entfernt</text>

    <text x="50" y="200" font-size="38" font-weight="800" fill="#FFFFFF">
      Soll ich hinlaufen oder hinfahren?
    </text>
    <text x="50" y="248" class="mono" font-size="26" fill="#6B7280"
          font-weight="500">→ ChatGPT antwortet ernsthaft</text>
  </g>

  <!-- Card 2: hook -->
  <g transform="translate(80, 1220)">
    <rect x="0" y="0" width="920" height="340" rx="14" fill="#0E0E0E"/>
    <rect x="0" y="0" width="6" height="340" fill="#C4B5FD"/>

    <text x="50" font-size="40" font-weight="500" fill="#E5E7EB">
      <tspan x="50" y="90">Eine Frage, die jeder Mensch</tspan>
      <tspan x="50" y="145">in 2 Sekunden beantwortet —</tspan>
      <tspan x="50" y="215" font-weight="800" fill="#FFFFFF">die KI braucht 4 Absätze.</tspan>
      <tspan x="50" y="285" fill="#9CA3AF">Welche Antwort hättest du gewählt?</tspan>
    </text>
  </g>

  <!-- Footer -->
  <text x="540" y="1790" text-anchor="middle" class="mono" font-size="32"
        fill="#C4B5FD" font-weight="600">tiktok.com/@techlogia</text>
  <text x="540" y="1840" text-anchor="middle" class="mono" font-size="24"
        fill="#4B5563" letter-spacing="6" font-weight="500">TECHLOGIA.DE  ·  KI IM ALLTAG</text>
</svg>
