<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <title>TikTok Cover – Waschanlage</title>
  <style>
    html,body{margin:0;padding:0;background:#111;color:#eee;font-family:system-ui,sans-serif}
    .wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px}
    .frame{width:min(360px,90vw);aspect-ratio:9/16;box-shadow:0 20px 60px rgba(0,0,0,.6);border-radius:18px;overflow:hidden;background:#000}
    .frame object{width:100%;height:100%;display:block}
    a.btn{background:#FE2C55;color:#fff;text-decoration:none;padding:10px 18px;border-radius:999px;font-weight:700}
    p{max-width:520px;text-align:center;line-height:1.4}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>TikTok Cover · 1080×1920</h1>
    <div class="frame">
      <object data="cover.svg" type="image/svg+xml" aria-label="TikTok Cover"></object>
    </div>
    <p>Öffne <code>cover.svg</code> direkt im Browser und mach einen Screenshot,
       oder konvertiere das SVG zu PNG/JPG (z.&nbsp;B. mit
       <code>rsvg-convert -w 1080 cover.svg -o cover.png</code>).</p>
    <a class="btn" href="cover.svg" download>cover.svg herunterladen</a>
  </div>
</body>
</html>
