services:
  # Frontend React SPA - only needs external access
  frontend:
    build: ./frontend
    container_name: certwatcher-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_URL}}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-${SUPABASE_ANON_KEY}}
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Agent für Intranet-Scans
  agent:
    build: ./agent
    container_name: certwatcher-agent
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SCAN_TARGETS: ${SCAN_TARGETS:-localhost}
      SCAN_PORTS: ${SCAN_PORTS:-443,8443,636}
      SCAN_INTERVAL: ${SCAN_INTERVAL:-3600}
      SCAN_TIMEOUT: ${SCAN_TIMEOUT:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW

  # Worker (optional) für komplexe Jobs
  worker:
    build: ./worker
    container_name: certwatcher-worker
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      WORKER_INTERVAL: ${WORKER_INTERVAL:-300}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      ALLOWED_ORIGINS: ${CORS_ORIGIN:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Redis für MCP Context State
  redis:
    image: redis:7-alpine
    container_name: certwatcher-redis
    restart: unless-stopped
    # No external port exposure - only accessible within Docker network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme-in-production}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme-in-production}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # MCP Server für AI/API Integration
  mcp-server:
    build: ./mcp-server
    container_name: certwatcher-mcp
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PORT: 8787
      NODE_ENV: ${NODE_ENV:-production}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme-in-production}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      API_KEY_HASH_SECRET: ${API_KEY_HASH_SECRET}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8787/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # No external access - isolated backend network

volumes:
  redis_data:
